name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Capacitor projesini hazırla
        run: |
          node -v
          npm -v

          cat > package.json <<'EOF'
          {
            "name": "takip-app",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/android": "^8.0.0",
              "@capacitor/core": "^8.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^8.0.0"
            }
          }
          EOF

          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.mete.takip",
            "appName": "Takip",
            "webDir": "www"
          }
          EOF

          mkdir -p www
          cp index.html www/index.html

          npm install
          npx cap add android
          npx cap sync android

      - name: APK oluştur
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK'yı yükle
        uses: actions/upload-artifact@v4
        with:
          name: takip-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
